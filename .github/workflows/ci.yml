name: CI

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  # Validates the OpenNext/Cloudflare Workers build packaging path used by production deployments.
  # Runs only on push to main (not on pull requests) to keep PR feedback cycles fast.
  validate-deployment-path:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate posts data
        run: bun run scripts/generate-posts-data.ts

      - name: Build for Cloudflare Workers
        run: bun run opennextjs-cloudflare build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
